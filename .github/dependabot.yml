version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      docker-minor-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/ui"
    schedule:
      interval: "daily"
    versioning-strategy: "increase"
    open-pull-requests-limit: 30
    groups:
      dev-dependencies:
        dependency-type: "development"
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    directory: "/admin"
    schedule:
      interval: "daily"
    versioning-strategy: "increase"
    open-pull-requests-limit: 30
    groups:
      dev-dependencies:
        dependency-type: "development"
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 30
    # Bundle all minor + patch Go module bumps into a single PR per run.
    # Major bumps stay as individual PRs (need a human review) and the
    # auto-merge workflow ignores them.
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"