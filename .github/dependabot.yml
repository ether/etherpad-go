version: 2
# Pin the npm base registry to public npmjs. Dependabot's environment otherwise
# routes npm resolution through GitHub Packages (npm.pkg.github.com), which
# serves stale metadata for some packages (e.g. @types/react-dom maxes out at
# 17.0.11 there) and makes pnpm fail with ERR_PNPM_NO_MATCHING_VERSION instead
# of falling back to npmjs. replaces-base makes npmjs the base registry so the
# whole workspace resolves against it. Public registry, so no token needed.
registries:
  npmjs:
    type: npm-registry
    url: https://registry.npmjs.org
    replaces-base: true
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      actions-minor-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "daily"
    groups:
      docker-minor-patch:
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: "npm"
    # This is a pnpm workspace: pnpm-workspace.yaml and pnpm-lock.yaml live at
    # the repo root. Dependabot's pnpm support refuses to update a workspace
    # from inside a subdirectory ("Updating workspaces from inside a workspace
    # subdirectory is not supported ... should only update from the root
    # workspace"), so a single root entry covers all members (ui, admin,
    # playwright, plugins/*).
    directory: "/"
    # Force npm resolution through public npmjs (see registries block above).
    registries:
      - npmjs
    schedule:
      interval: "daily"
    versioning-strategy: "increase"
    open-pull-requests-limit: 30
    # Wait until a release has aged before opening a PR. CI installs the
    # latest pnpm, which enforces a 24h minimumReleaseAge supply-chain gate on
    # the lockfile; opening PRs sooner just produces runs that fail that gate.
    # The cooldown keeps the protection and avoids the doomed PRs.
    cooldown:
      default-days: 3
    groups:
      dev-dependencies:
        dependency-type: "development"
      prod-minor-patch:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"
  - package-ecosystem: gomod
    directory: "/"
    schedule:
      interval: "daily"
    open-pull-requests-limit: 30
    # Bundle all minor + patch Go module bumps into a single PR per run.
    # Major bumps stay as individual PRs (need a human review) and the
    # auto-merge workflow ignores them.
    groups:
      go-minor-patch:
        update-types:
          - "minor"
          - "patch"